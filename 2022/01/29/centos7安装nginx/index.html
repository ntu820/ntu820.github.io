                <h3 id="Centos7安装nginx"><a href="#Centos7安装nginx" class="headerlink" title="Centos7安装nginx"></a>Centos7安装nginx</h3><h4 id="安装依赖包"><a href="#安装依赖包" class="headerlink" title="安装依赖包"></a>安装依赖包</h4><figure><div class="code-wrapper"><pre class="line-numbers language-bash" data-language="bash"><code class="language-bash">yum <span class="token function">install</span> <span class="token parameter variable">-y</span> gcc automake autoconf libtool <span class="token function">make</span>
yum <span class="token function">install</span> <span class="token parameter variable">-y</span> gcc-c++
yum <span class="token function">install</span> <span class="token parameter variable">-y</span> pcre pcre-devel
yum <span class="token function">install</span> <span class="token parameter variable">-y</span> zlib zlib-devel
yum <span class="token function">install</span> <span class="token parameter variable">-y</span> openssl openssl-devel<span aria-hidden="true" class="line-numbers-rows"><span></span><span></span><span></span><span></span><span></span></span></code></pre></div></figure>

<h4 id="下载nginx安装包"><a href="#下载nginx安装包" class="headerlink" title="下载nginx安装包"></a>下载nginx安装包</h4><figure><div class="code-wrapper"><pre class="line-numbers language-bash" data-language="bash"><code class="language-bash"><span class="token function">wget</span> http://nginx.org/download/nginx-1.20.1.tar.gz<span aria-hidden="true" class="line-numbers-rows"><span></span></span></code></pre></div></figure>

<h4 id="安装nginx"><a href="#安装nginx" class="headerlink" title="安装nginx"></a>安装nginx</h4><figure><div class="code-wrapper"><pre class="line-numbers language-bash" data-language="bash"><code class="language-bash"><span class="token function">tar</span> <span class="token parameter variable">-zxvf</span>  nginx-1.20.1.tar.gz
<span class="token builtin class-name">cd</span> nginx-1.20.1
./configure
<span class="token function">make</span> <span class="token operator">&amp;&amp;</span> <span class="token function">make</span> <span class="token function">install</span><span aria-hidden="true" class="line-numbers-rows"><span></span><span></span><span></span><span></span></span></code></pre></div></figure>

<h4 id="启动nginx"><a href="#启动nginx" class="headerlink" title="启动nginx"></a>启动nginx</h4><figure><div class="code-wrapper"><pre class="line-numbers language-bash" data-language="bash"><code class="language-bash"><span class="token comment"># 切换到nginx默认安装目录</span>
<span class="token builtin class-name">cd</span> /usr/local/nginx/sbin
<span class="token comment"># 启动</span>
./nginx
<span class="token comment"># 查看nginx启动情况</span>
<span class="token function">netstat</span> -nlp<span class="token operator">|</span><span class="token function">grep</span> <span class="token number">80</span><span aria-hidden="true" class="line-numbers-rows"><span></span><span></span><span></span><span></span><span></span><span></span></span></code></pre></div></figure>

<h4 id="配置及开机自启动"><a href="#配置及开机自启动" class="headerlink" title="配置及开机自启动"></a>配置及开机自启动</h4><figure><div class="code-wrapper"><pre class="line-numbers language-bash" data-language="bash"><code class="language-bash"><span class="token comment"># 配置nginx命令</span>
<span class="token function">ln</span> <span class="token parameter variable">-s</span> /usr/local/nginx/sbin/nginx /usr/local/bin/nginx
<span class="token comment"># 开机自启</span>
systemctl status rc-local <span class="token comment"># 查看自启文件，centos一般默认为 /etc/rc.d/rc.local</span>
<span class="token function">vi</span> /etc/rc.d/rc.local
<span class="token comment"># 在最后一行添加nginx启动</span>
/usr/local/nginx/sbin/nginx
<span class="token comment"># 赋予可执行权限</span>
<span class="token function">chmod</span> +x /etc/rc.d/ec.local
<span class="token comment"># 重新加载，需要先停止nginx服务，否付会出现端口已经占用的错误</span>
systemctl reload rc-local<span aria-hidden="true" class="line-numbers-rows"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></span></code></pre></div></figure>
